events {}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    log_format upstream '$remote_addr - $request status=$status '
                        'upstream=$upstream_addr upstream_status=$upstream_status';
    access_log /dev/stdout upstream;

    resolver 127.0.0.11 valid=10s ipv6=off;

    upstream noapp_backend {
        zone noapp_backend 64k;
        server noapp-1:8080 resolve max_fails=1 fail_timeout=5s;
        server noapp-2:8080 resolve max_fails=1 fail_timeout=5s;
    }

    upstream noapp_realtime {
        zone noapp_realtime 64k;
        server realtime:8084 resolve max_fails=1 fail_timeout=5s;
    }

    server {
        listen 8080;

        location = /api/realtime {
            proxy_pass http://noapp_realtime;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 2s;
            proxy_read_timeout 75s;
            proxy_send_timeout 10s;
        }

        location / {
            proxy_pass http://noapp_backend;
            proxy_http_version 1.1;
            proxy_connect_timeout 1s;
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header X-NoApp-Upstream $upstream_addr always;
        }
    }
}
