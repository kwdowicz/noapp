services:
  noapp-1:
    build:
      context: .
    environment:
      APP_ADDR: ":8080"
      APP_ENV: "development"
      DATABASE_URL: "postgres://noapp:noapp@db:5432/noapp?sslmode=disable"
      AUTH_ISSUER_URL: "http://localhost:8082/realms/noapp"
      AUTH_JWKS_URL: "http://auth:8080/realms/noapp/protocol/openid-connect/certs"
      AUTH_AUDIENCE: "noapp-api"
      AUTH_BROWSER_ISSUER_URL: "http://localhost:8082/realms/noapp"
      AUTH_BROWSER_CLIENT_ID: "noapp-web"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
      OTEL_RESOURCE_ATTRIBUTES: "service.instance.id=noapp-1"
      PYROSCOPE_SERVER_ADDRESS: "http://pyroscope:4040"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started
      pyroscope:
        condition: service_started
      auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/api/health | grep -q '\"status\":\"ok\"'"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - noapp-net
    restart: unless-stopped

  noapp-2:
    build:
      context: .
    environment:
      APP_ADDR: ":8080"
      APP_ENV: "development"
      DATABASE_URL: "postgres://noapp:noapp@db:5432/noapp?sslmode=disable"
      AUTH_ISSUER_URL: "http://localhost:8082/realms/noapp"
      AUTH_JWKS_URL: "http://auth:8080/realms/noapp/protocol/openid-connect/certs"
      AUTH_AUDIENCE: "noapp-api"
      AUTH_BROWSER_ISSUER_URL: "http://localhost:8082/realms/noapp"
      AUTH_BROWSER_CLIENT_ID: "noapp-web"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
      OTEL_RESOURCE_ATTRIBUTES: "service.instance.id=noapp-2"
      PYROSCOPE_SERVER_ADDRESS: "http://pyroscope:4040"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started
      pyroscope:
        condition: service_started
      auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/api/health | grep -q '\"status\":\"ok\"'"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - noapp-net
    restart: unless-stopped

  load-balancer:
    image: nginx:1.29-alpine
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      noapp-1:
        condition: service_healthy
      noapp-2:
        condition: service_healthy
      realtime:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/api/health | grep -q '\"status\":\"ok\"'"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - noapp-net
    restart: unless-stopped

  outbox-relay:
    build:
      context: .
    command: ["outbox-relay"]
    environment:
      APP_ENV: "development"
      DATABASE_URL: "postgres://noapp:noapp@db:5432/noapp?sslmode=disable"
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_CLIENT_ID: "noapp-outbox-relay"
      RELAY_ADDR: ":8083"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
      OTEL_RESOURCE_ATTRIBUTES: "service.instance.id=outbox-relay-1"
      PYROSCOPE_SERVER_ADDRESS: "http://pyroscope:4040"
    depends_on:
      migrate:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started
      pyroscope:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8083/api/health | grep -q '\"status\":\"ok\"'"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - noapp-net
    restart: unless-stopped

  realtime:
    build:
      context: .
    command: ["realtime"]
    environment:
      APP_ENV: "development"
      REALTIME_ADDR: ":8084"
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_CLIENT_ID: "noapp-realtime"
      KAFKA_CONSUMER_GROUP: "noapp-realtime-v1"
      AUTH_ISSUER_URL: "http://localhost:8082/realms/noapp"
      AUTH_JWKS_URL: "http://auth:8080/realms/noapp/protocol/openid-connect/certs"
      AUTH_AUDIENCE: "noapp-api"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
      OTEL_RESOURCE_ATTRIBUTES: "service.instance.id=realtime-1"
      PYROSCOPE_SERVER_ADDRESS: "http://pyroscope:4040"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      auth:
        condition: service_healthy
      otel-collector:
        condition: service_started
      pyroscope:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8084/api/realtime/health | grep -q '\"status\":\"ok\"'"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - noapp-net
    restart: unless-stopped

  traffic-simulator:
    build:
      context: .
      dockerfile: Dockerfile.simulator
    environment:
      SIMULATOR_ADDR: ":8081"
      TARGET_APP_URL: "http://load-balancer:8080"
      AUTH_TOKEN_URL: "http://auth:8080/realms/noapp/protocol/openid-connect/token"
      AUTH_CLIENT_ID: "noapp-simulator"
      AUTH_CLIENT_SECRET: "noapp-simulator-dev-secret"
      APP_ENV: "development"
      PYROSCOPE_SERVER_ADDRESS: "http://pyroscope:4040"
    ports:
      - "8081:8081"
    depends_on:
      load-balancer:
        condition: service_healthy
      auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8081/api/health | grep -q '\"status\":\"ok\"'"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - noapp-net
    restart: unless-stopped

  auth:
    image: quay.io/keycloak/keycloak:26.7.0
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: "admin"
      KC_BOOTSTRAP_ADMIN_PASSWORD: "noapp"
      KC_DB: "postgres"
      KC_DB_URL: "jdbc:postgresql://auth-db:5432/keycloak"
      KC_DB_USERNAME: "keycloak"
      KC_DB_PASSWORD: "keycloak"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: "http://localhost:8082"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_EVENT_METRICS_USER_ENABLED: "true"
      KC_HTTP_METRICS_HISTOGRAMS_ENABLED: "true"
      KC_HTTP_ACCESS_LOG_ENABLED: "true"
      KC_LOG_CONSOLE_OUTPUT: "json"
      KC_LOG_SERVICE_NAME: "noapp-auth"
      KC_LOG_SERVICE_ENVIRONMENT: "development"
      KC_FEATURES: "opentelemetry-logs,opentelemetry-metrics,user-event-metrics"
      KC_TRACING_ENABLED: "true"
      KC_TRACING_SAMPLER_TYPE: "always_on"
      KC_TELEMETRY_ENDPOINT: "http://otel-collector:4318"
      KC_TELEMETRY_PROTOCOL: "http/protobuf"
      KC_TELEMETRY_SERVICE_NAME: "noapp-auth"
      KC_TELEMETRY_RESOURCE_ATTRIBUTES: "deployment.environment.name=development,service.version=26.7.0"
      KC_TELEMETRY_LOGS_ENABLED: "true"
      KC_TELEMETRY_LOGS_LEVEL: "INFO"
      KC_TELEMETRY_METRICS_ENABLED: "true"
      KC_TELEMETRY_METRICS_INTERVAL: "5s"
    ports:
      - "8082:8080"
    volumes:
      - ./keycloak/noapp-realm.json:/opt/keycloak/data/import/noapp-realm.json:ro
    depends_on:
      auth-db:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "bash", "-ec", "{ printf 'HEAD /health/ready HTTP/1.0\\r\\n\\r\\n' >&0; grep 'HTTP/1.0 200'; } 0<>/dev/tcp/127.0.0.1/9000"]
      interval: 5s
      timeout: 3s
      retries: 40
      start_period: 20s
    networks:
      - noapp-net
    restart: unless-stopped

  auth-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - auth-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 2s
      timeout: 3s
      retries: 20
    networks:
      - noapp-net
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector:0.151.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel/collector.yaml:/etc/otelcol/config.yaml:ro
    networks:
      - noapp-net
    depends_on:
      loki:
        condition: service_started
      tempo:
        condition: service_started
    restart: unless-stopped

  tempo:
    image: grafana/tempo:3.0.0
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    user: "0:0"
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    networks:
      - noapp-net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.13.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yaml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - prometheus-data:/prometheus
    depends_on:
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:9090/-/healthy | grep -q Healthy"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - noapp-net
    restart: unless-stopped

  loki:
    image: grafana/loki:3.7.0
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./loki/config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    networks:
      - noapp-net
    restart: unless-stopped

  pyroscope:
    image: grafana/pyroscope:2.0.2
    volumes:
      - pyroscope-data:/data
      - pyroscope-compactor-data:/data-compactor
      - pyroscope-metastore-data:/data-metastore
    networks:
      - noapp-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:13.1.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: noapp
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_PLUGINS_PREINSTALL_DISABLED: "true"
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/datasources/loki.yaml:/etc/grafana/provisioning/datasources/loki.yaml:ro
      - ./grafana/provisioning/dashboards/noapp.yaml:/etc/grafana/provisioning/dashboards/noapp.yaml:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      loki:
        condition: service_started
      prometheus:
        condition: service_healthy
      tempo:
        condition: service_started
      pyroscope:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/health | grep -q '\"database\": \"ok\"'"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - noapp-net
    restart: unless-stopped

  kafka:
    image: apache/kafka:4.3.1
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_NUM_PARTITIONS: "6"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server 127.0.0.1:9092 --list >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    networks:
      - noapp-net
    restart: unless-stopped

  kafka-init:
    image: apache/kafka:4.3.1
    command:
      - /opt/kafka/bin/kafka-topics.sh
      - --bootstrap-server
      - kafka:9092
      - --create
      - --if-not-exists
      - --topic
      - noapp.board-events.v1
      - --partitions
      - "6"
      - --replication-factor
      - "1"
      - --config
      - retention.ms=259200000
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - noapp-net
    restart: "no"

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: noapp
      POSTGRES_USER: noapp
      POSTGRES_PASSWORD: noapp
    volumes:
      - noapp-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noapp -d noapp"]
      interval: 2s
      timeout: 3s
      retries: 20
    networks:
      - noapp-net
    restart: unless-stopped

  migrate:
    image: postgres:17-alpine
    environment:
      PGPASSWORD: "noapp"
    command: ["psql", "-v", "ON_ERROR_STOP=1", "-h", "db", "-U", "noapp", "-d", "noapp", "-f", "/migrations/002_realtime.sql"]
    volumes:
      - ./db/migrations/002_realtime.sql:/migrations/002_realtime.sql:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - noapp-net
    restart: "no"

networks:
  noapp-net:
    name: noapp-network
    driver: bridge

volumes:
  auth-data:
    name: noapp-auth-data
  noapp-data:
    name: noapp-postgres-data
  loki-data:
    name: noapp-loki-data
  grafana-data:
    name: noapp-grafana-data
  prometheus-data:
    name: noapp-prometheus-data
  tempo-data:
    name: noapp-tempo-data
  pyroscope-data:
    name: noapp-pyroscope-data
  pyroscope-compactor-data:
    name: noapp-pyroscope-compactor-data
  pyroscope-metastore-data:
    name: noapp-pyroscope-metastore-data
  kafka-data:
    name: noapp-kafka-data
