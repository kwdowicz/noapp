services:
  app:
    build:
      context: .
    environment:
      APP_ADDR: ":8080"
      APP_ENV: "development"
      DATABASE_URL: "postgres://noapp:noapp@db:5432/noapp?sslmode=disable"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8080/api/health | grep -q '\"status\":\"ok\"'"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - noapp-net
    restart: unless-stopped

  traffic-simulator:
    build:
      context: .
      dockerfile: Dockerfile.simulator
    environment:
      SIMULATOR_ADDR: ":8081"
      TARGET_APP_URL: "http://app:8080"
    ports:
      - "8081:8081"
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8081/api/health | grep -q '\"status\":\"ok\"'"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - noapp-net
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector:0.151.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel/collector.yaml:/etc/otelcol/config.yaml:ro
    networks:
      - noapp-net
    depends_on:
      loki:
        condition: service_started
      tempo:
        condition: service_started
    restart: unless-stopped

  tempo:
    image: grafana/tempo:3.0.0
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    user: "0:0"
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    networks:
      - noapp-net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.13.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yaml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - prometheus-data:/prometheus
    depends_on:
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:9090/-/healthy | grep -q Healthy"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - noapp-net
    restart: unless-stopped

  loki:
    image: grafana/loki:3.7.0
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./loki/config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    networks:
      - noapp-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:13.1.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: noapp
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_PLUGINS_PREINSTALL_DISABLED: "true"
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/datasources/loki.yaml:/etc/grafana/provisioning/datasources/loki.yaml:ro
      - ./grafana/provisioning/dashboards/noapp.yaml:/etc/grafana/provisioning/dashboards/noapp.yaml:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      loki:
        condition: service_started
      prometheus:
        condition: service_healthy
      tempo:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/health | grep -q '\"database\": \"ok\"'"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - noapp-net
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: noapp
      POSTGRES_USER: noapp
      POSTGRES_PASSWORD: noapp
    volumes:
      - noapp-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noapp -d noapp"]
      interval: 2s
      timeout: 3s
      retries: 20
    networks:
      - noapp-net
    restart: unless-stopped

networks:
  noapp-net:
    name: noapp-network
    driver: bridge

volumes:
  noapp-data:
    name: noapp-postgres-data
  loki-data:
    name: noapp-loki-data
  grafana-data:
    name: noapp-grafana-data
  prometheus-data:
    name: noapp-prometheus-data
  tempo-data:
    name: noapp-tempo-data
